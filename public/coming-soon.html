<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playfuli — Where great gifts come from.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <!-- Favicon: candle mark as data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 55'%3E%3Crect x='1' y='16' width='12' height='39' rx='6' fill='%23084B6D'/%3E%3Crect x='1' y='24' width='12' height='7' fill='rgba(255,255,255,0.45)' /%3E%3Crect x='1' y='38' width='12' height='7' fill='rgba(255,255,255,0.45)' /%3E%3Cellipse cx='7' cy='6' rx='4.5' ry='6' fill='%23F2D888'/%3E%3C/svg%3E" />
  <style>
    :root {
      --teal:       #084B6D;
      --periwinkle: #B0BDDF;
      --baby-blue:  #CDE8EF;
      --sage:       #D2E0CA;
      --dandelion:  #F2D888;
      --rose:       #E8C4C0;
      --white:      #FFFFFF;
      --snow:       #FAFBFD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--teal);
      color: #fff;
      overflow: hidden;
    }

    /* ── Full-viewport hero ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Confetti background ── */
    .hero-confetti {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Content stack ── */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: flex-end;
      gap: 0;
      animation: fadeSlideUp 0.8s ease-out both;
    }
    .logo span {
      font-family: 'Fredoka', sans-serif;
      font-size: 80px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
    }
    .candle-svg {
      width: 20px;
      height: 60px;
      margin-bottom: 10px;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Fredoka', sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-top: 16px;
      letter-spacing: 0.2px;
      animation: fadeSlideUp 0.8s ease-out 0.15s both;
    }

    /* ── One-liner ── */
    .description {
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-top: 10px;
      text-align: center;
      white-space: nowrap;
      animation: fadeSlideUp 0.8s ease-out 0.3s both;
    }

    /* ── Email signup ── */
    .signup {
      display: flex;
      gap: 0;
      margin-top: 36px;
      animation: fadeSlideUp 0.8s ease-out 0.45s both;
    }
    .signup input {
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--teal);
      background: #fff;
      border: none;
      border-radius: 12px 0 0 12px;
      padding: 14px 20px;
      width: 280px;
      outline: none;
    }
    .signup input::placeholder {
      color: #aab4c2;
    }
    .signup button {
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--teal);
      background: var(--dandelion);
      border: none;
      border-radius: 0 12px 12px 0;
      padding: 14px 28px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .signup button:hover {
      opacity: 0.88;
    }

    /* ── Launch hint ── */
    .launch-hint {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 28px;
      animation: fadeSlideUp 0.8s ease-out 0.6s both;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      z-index: 1;
      animation: fadeIn 1s ease-out 0.8s both;
    }

    /* ── Animations ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .logo span { font-size: 52px; }
      .candle-svg { width: 13px; height: 39px; margin-bottom: 7px; }
      .tagline { font-size: 17px; }
      .description { font-size: 14px; }
      .signup { flex-direction: column; gap: 10px; width: 90%; max-width: 320px; }
      .signup input { width: 100%; border-radius: 12px; }
      .signup button { border-radius: 12px; text-align: center; }
    }
  </style>
</head>
<body>

<div class="hero">
  <canvas class="hero-confetti" id="confettiCanvas"></canvas>

  <div class="content">
    <!-- Logo -->
    <div class="logo">
      <img src="Playfuli-white.svg" alt="Playfuli" style="display:block;height:64px">
    </div>

    <!-- Tagline -->
    <p class="tagline">Where great gifts come from.</p>

    <!-- One-liner -->
    <p class="description">We learn what they love, have, and want — so your gift gets played with. Fully.</p>

    <!-- Email signup -->
    <form class="signup" onsubmit="handleSignup(event)">
      <input type="email" placeholder="you@email.com" required />
      <button type="submit">Notify me</button>
    </form>

    <!-- Launch hint -->
    <p class="launch-hint">Coming Summer 2026</p>
  </div>

  <!-- Footer -->
  <p class="footer">&copy; 2026 Playfuli</p>
</div>

<script>
  // ── Confetti canvas ──
  const PASTELS = ['#CDE8EF','#D2E0CA','#F2D888','#E8C4C0','#B0BDDF'];

  // Mulberry32 — better distribution than LCG
  function seedRng(seed) {
    let t = seed | 0;
    return () => {
      t = (t + 0x6D2B79F5) | 0;
      let x = Math.imul(t ^ (t >>> 15), 1 | t);
      x = (x + Math.imul(x ^ (x >>> 7), 61 | x)) ^ x;
      return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
    };
  }

  function drawConfetti(canvas, { count = 60, seed = 42 } = {}) {
    const rng = seedRng(seed);
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    if (!w || !h) return;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    for (let i = 0; i < count; i++) {
      const x = rng() * w, y = rng() * h;
      const sz = 4 + rng() * 10;
      const shape = rng() > 0.6 ? 'square' : 'circle';
      const alpha = 0.3 + rng() * 0.2;
      const color = PASTELS[Math.floor(rng() * PASTELS.length)];

      const r = parseInt(color.slice(1,3), 16);
      const g = parseInt(color.slice(3,5), 16);
      const b = parseInt(color.slice(5,7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;

      if (shape === 'circle') {
        ctx.beginPath();
        ctx.arc(x, y, sz / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((15 + rng() * 50) * Math.PI / 180);
        ctx.fillRect(-sz/2, -sz/2, sz, sz);
        ctx.restore();
      }
    }
  }

  function init() {
    const canvas = document.getElementById('confettiCanvas');
    drawConfetti(canvas, { count: 80, seed: 42 });
  }

  window.addEventListener('load', init);
  window.addEventListener('resize', () => setTimeout(init, 100));

  // ── Signup handler (placeholder) ──
  function handleSignup(e) {
    e.preventDefault();
    const input = e.target.querySelector('input');
    const btn = e.target.querySelector('button');
    btn.textContent = "You're in! 🎉";
    btn.style.background = '#D2E0CA';
    input.disabled = true;
    btn.disabled = true;
  }
</script>

</body>
</html>
